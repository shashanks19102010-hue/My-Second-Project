<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shashank | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#ffffff;
color:#111;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
width:100%;
padding:20px 10%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,0.05);
z-index:1000;
}

nav h1{
font-size:24px;
font-weight:800;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li a{
text-decoration:none;
color:#111;
font-weight:500;
transition:0.3s;
}

nav ul li a:hover{
color:#6c63ff;
}

/* HERO */

.hero{
position:relative;
height:100vh;
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
text-align:center;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:70%;
background:url("20250913_155828.heic") center/cover no-repeat;
animation:zoom 15s infinite alternate ease-in-out;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:70%;
background:linear-gradient(to bottom, rgba(255,255,255,0), #ffffff);
}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

.hero-content{
position:relative;
z-index:2;
padding-bottom:100px;
}

.hero h2{
font-size:55px;
font-weight:800;
margin-bottom:10px;
}

.hero span{
color:#6c63ff;
}

.typing{
font-size:22px;
font-weight:500;
color:#555;
height:30px;
margin-bottom:20px;
}

.btn{
padding:12px 30px;
border:none;
background:#6c63ff;
color:#fff;
border-radius:30px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* SECTION */

section{
padding:100px 10%;
}

.section-title{
font-size:40px;
font-weight:800;
margin-bottom:40px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
padding:30px;
background:#fff;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* FOOTER */

footer{
padding:30px;
text-align:center;
background:#f5f5f5;
}

</style>
</head>
<body>

<nav>
<h1>Shashank</h1>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#about">About</a></li>
<li><a href="#skills">Skills</a></li>
</ul>
</nav>

<section class="hero" id="home">
<div class="hero-content">
<h2>Hi, I'm <span>Shashank</span></h2>
<div class="typing" id="typing"></div>
<a href="#about"><button class="btn">Explore</button></a>
</div>
</section>

<section id="about">
<h2 class="section-title">About Me</h2>
<div class="cards">
<div class="card">
<p>I am a passionate student learning coding and building powerful websites. I love creating modern and animated designs.</p>
</div>
</div>
</section>

<section id="skills">
<h2 class="section-title">My Skills</h2>
<div class="cards">
<div class="card">HTML</div>
<div class="card">CSS</div>
<div class="card">JavaScript</div>
<div class="card">Creative Design</div>
</div>
</section>

<footer>
© 2026 Shashank | All Rights Reserved
</footer>

<script>

const text = ["Web Developer","Creative Designer","Future Tech Expert"];
let i=0;
let j=0;
let current="";
let isDeleting=false;

function type(){
current = text[i];
document.getElementById("typing").textContent = current.substring(0,j);

if(!isDeleting && j < current.length){
j++;
setTimeout(type,100);
}
else if(isDeleting && j>0){
j--;
setTimeout(type,50);
}
else{
isDeleting=!isDeleting;
if(!isDeleting){
i=(i+1)%text.length;
}
setTimeout(type,1000);
}
}

type();

</script>

</body>
</html>
